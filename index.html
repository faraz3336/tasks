<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faraz Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-200 min-h-screen">
    <div class="flex items-center gap-2 p-4">
      <img
        src="static/logo.jpg"
        alt="Logo"
        class="w-20 h-20 rounded-full object-cover"
      />
      <h1 class="text-2xl text-gray-500 font-bold">Ninja-Tutorials</h1>
    </div>
    <div class="bg-white w-[500px] p-10 shadow-xl mx-auto mt-10 rounded-2xl">
      <h2 class="text-gray-500 mb-2">Please Enter Your Details</h2>
      <h1 class="text-2xl text-gray-700 font-bold mb-8">
        Welcome to Ninja-Tutorials
      </h1>
      <input
        type="email"
        placeholder="Email address"
        class="w-full p-3 border rounded-md mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <input
        type="password"
        placeholder="Password"
        class="w-full border p-3 rounded-md mb-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <div class="flex justify-between mt-4">
        <div class="flex items-center gap-2 mb-6">
          <input class="w-4 h-4" type="checkbox" />
          <p class="text-gray-600 text-sm">Remember me</p>
        </div>
        <a href="#" class="text-sm text-blue-500 underline font-medium"
          >Forgot password?</a
        >
      </div>
      <button
        class="w-full p-3 border bg-blue-500 text-white rounded-md hover:scale-105 transition duration-300 mb-4"
      >
        Sign up
      </button>
      <div>
        <button
          class="flex w-full border-2 p-2 rounded-md justify-center items-center gap-3 hover:scale-105 duration-300"
        >
          <img
            src="static/google-logo.jpg"
            alt="google-logo"
            class="w-7 h-7 rounded-full object-cover"
          />
          <span>Sign in with Google</span>
        </button>
      </div>
      <p
        class="flex justify-center items-center mt-3 text-gray-600 font-medium gap-2"
      >
        Don't have an account?
        <a href="#" class="text-blue-500 underline">Sign up</a>
      </p>
    </div>
  </body>
</html>
